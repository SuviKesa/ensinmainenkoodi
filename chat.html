<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #667eea;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-section {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .user-input {
            display: flex;
            gap: 8px;
        }

        .user-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .user-input button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .user-input button:hover {
            background: #764ba2;
        }

        .current-user {
            margin-top: 10px;
            padding: 8px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            font-size: 13px;
            text-align: center;
        }

        .rooms-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .rooms-title {
            font-weight: bold;
            color: #333;
            margin: 10px 0 5px 0;
            font-size: 12px;
            text-transform: uppercase;
        }

        .room-item {
            padding: 12px;
            margin: 5px 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-item:hover {
            background: #e0e0e0;
        }

        .room-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: #667eea;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.own .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message:not(.own) .message-bubble {
            background: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .message.own .message-sender {
            text-align: right;
            color: #667eea;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .message.own .message-time {
            text-align: right;
        }

        /* Input Area */
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #764ba2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100px;
            }

            .rooms-title,
            .user-input {
                display: none;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        @media (max-width: 480px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 80px;
                flex-direction: row;
                overflow-x: auto;
            }

            .rooms-section {
                flex-direction: row;
                padding: 5px;
            }

            .room-item {
                white-space: nowrap;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">💬 Chats</div>
            <div class="user-section">
                <div class="user-input">
                    <input type="text" id="usernameInput" placeholder="Your name">
                    <button onclick="setUsername()">Set</button>
                </div>
                <div class="current-user" id="currentUser">Anonymous</div>
            </div>
            <div class="rooms-section">
                <div class="rooms-title">Channels</div>
                <div class="room-item active" onclick="switchRoom('general')">
                    # general
                </div>
                <div class="room-item" onclick="switchRoom('random')">
                    # random
                </div>
                <div class="room-item" onclick="switchRoom('ideas')">
                    # ideas
                </div>
                <div class="room-item" onclick="switchRoom('help')">
                    # help
                </div>
                <div class="room-item" onclick="switchRoom('announcements')">
                    📢 announcements
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader"># general</div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type a message..."
                    onkeypress="handleKeypress(event)"
                >
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // App State
        let currentUser = 'Anonymous';
        let currentRoom = 'general';
        let messages = {
            general: [
                { user: 'System', message: 'Welcome to the general chat!', time: '10:00', own: false },
                { user: 'System', message: 'Start a conversation by typing below.', time: '10:01', own: false }
            ],
            random: [
                { user: 'System', message: 'Share random thoughts and ideas here!', time: '10:00', own: false }
            ],
            ideas: [
                { user: 'System', message: 'Share your brilliant ideas here!', time: '10:00', own: false }
            ],
            help: [
                { user: 'System', message: 'Need help? Ask away!', time: '10:00', own: false }
            ],
            announcements: [
                { user: 'System', message: 'Important announcements will appear here.', time: '10:00', own: false }
            ]
        };

        // Load messages from localStorage
        function loadMessages() {
            const saved = localStorage.getItem('chatMessages');
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                } catch (e) {
                    console.log('Could not load saved messages');
                }
            }
        }

        // Save messages to localStorage
        function saveMessages() {
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        // Save username to localStorage
        function loadUsername() {
            const saved = localStorage.getItem('chatUsername');
            if (saved) {
                currentUser = saved;
                document.getElementById('usernameInput').value = saved;
                document.getElementById('currentUser').textContent = `👤 ${saved}`;
            }
        }

        function setUsername() {
            const input = document.getElementById('usernameInput').value.trim();
            if (input) {
                currentUser = input;
                localStorage.setItem('chatUsername', input);
                document.getElementById('currentUser').textContent = `👤 ${input}`;
                document.getElementById('usernameInput').value = '';
                alert(`Welcome, ${currentUser}!`);
            } else {
                alert('Please enter a valid name');
            }
        }

        function switchRoom(room) {
            currentRoom = room;
            document.querySelectorAll('.room-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            document.getElementById('chatHeader').textContent = `# ${room}`;
            displayMessages();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (message) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + 
                            now.getMinutes().toString().padStart(2, '0');

                messages[currentRoom].push({
                    user: currentUser,
                    message: message,
                    time: time,
                    own: true
                });

                input.value = '';
                saveMessages();
                displayMessages();
                scrollToBottom();
            }
        }

        function displayMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            messages[currentRoom].forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.own ? 'own' : ''}`;

                const senderDiv = document.createElement('div');
                senderDiv.className = 'message-sender';
                senderDiv.textContent = msg.user;

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';

                const textDiv = document.createElement('div');
                textDiv.textContent = msg.message;

                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = msg.time;

                bubbleDiv.appendChild(textDiv);
                bubbleDiv.appendChild(timeDiv);

                if (msg.own) {
                    messageDiv.appendChild(bubbleDiv);
                    messageDiv.appendChild(senderDiv);
                } else {
                    messageDiv.appendChild(senderDiv);
                    messageDiv.appendChild(bubbleDiv);
                }

                container.appendChild(messageDiv);
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        function handleKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            loadUsername();
            loadMessages();
            displayMessages();
            scrollToBottom();
        });
    </script>
</body>
</html>
